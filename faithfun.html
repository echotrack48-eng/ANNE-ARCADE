<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Faith Fun 🧁 — Anne Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#ff3d8a;--yellow:#ffd600;--cyan:#00e5ff;
  --green:#00e676;--purple:#9c27b0;--orange:#ff6d00;
  --bg:#09000f;--card:#16002a;--border:rgba(255,255,255,0.08);
  --text:#f0e6ff;--muted:rgba(255,255,255,0.45);
  --font:'Nunito',sans-serif;--display:'Boogaloo',cursive;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);
  font-family:var(--font);overflow-x:hidden}

body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 65% 45% at 20% 5%,rgba(0,229,255,0.12) 0%,transparent 60%),
    radial-gradient(ellipse 55% 40% at 85% 90%,rgba(156,33,176,0.14) 0%,transparent 60%)}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(9,0,15,0.92);
  border-bottom:1px solid var(--border);backdrop-filter:blur(16px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0.8rem 1.2rem;gap:0.5rem}
.nav-logo{font-family:var(--display);font-size:1.3rem;color:var(--yellow);
  text-decoration:none;text-shadow:0 0 16px rgba(255,214,0,0.35)}
.nav-links{display:flex;gap:0.35rem;flex-wrap:wrap}
.nav-link{padding:0.32rem 0.7rem;border-radius:20px;
  border:1.5px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.5);font-size:0.7rem;font-weight:800;
  cursor:pointer;text-decoration:none;transition:all 0.2s;white-space:nowrap}
.nav-link:hover{border-color:var(--cyan);color:var(--cyan)}
.nav-link.active{background:var(--cyan);border-color:var(--cyan);color:#000}

/* PAGE */
.page{position:relative;z-index:1;padding:1.5rem 1rem 3rem;
  max-width:580px;margin:0 auto}

/* HEADER */
.page-header{text-align:center;margin-bottom:1.5rem}
.page-eyebrow{font-size:0.62rem;font-weight:800;letter-spacing:0.25em;
  text-transform:uppercase;color:var(--cyan);opacity:0.8;margin-bottom:0.4rem}
.page-title{font-family:var(--display);font-size:clamp(2.2rem,8vw,3.5rem);
  color:var(--cyan);text-shadow:0 0 30px rgba(0,229,255,0.2);line-height:1}
.page-sub{font-size:0.82rem;color:var(--muted);margin-top:0.5rem;line-height:1.6}

/* DIFFICULTY SELECTOR */
.diff-wrap{margin-bottom:1.2rem}
.diff-label{font-size:0.6rem;font-weight:800;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--muted);margin-bottom:0.6rem;text-align:center}
.diff-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem}
.diff-btn{padding:0.8rem 0.5rem;border:2px solid var(--border);
  background:rgba(255,255,255,0.025);border-radius:14px;cursor:pointer;
  font-family:var(--font);font-weight:800;color:var(--muted);
  transition:all 0.2s;text-align:center;line-height:1.5}
.diff-btn .diff-icon{font-size:1.5rem;display:block;margin-bottom:0.3rem}
.diff-btn .diff-name{font-size:0.82rem;display:block}
.diff-btn .diff-info{font-size:0.62rem;color:rgba(255,255,255,0.3);display:block;margin-top:0.15rem}
.diff-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,0.05)}
.diff-btn.active{border-color:var(--cyan);color:var(--cyan);
  background:rgba(0,229,255,0.08);
  box-shadow:0 0 20px rgba(0,229,255,0.1)}

/* HUD */
.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;margin-bottom:1rem}
.hud-cell{background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:0.6rem 0.4rem;text-align:center}
.hud-label{font-size:0.48rem;font-weight:800;letter-spacing:0.15em;
  text-transform:uppercase;color:var(--muted);margin-bottom:0.2rem}
.hud-val{font-family:var(--display);font-size:1.2rem;color:var(--yellow);line-height:1}
.hud-cell.h-time .hud-val{color:var(--cyan)}
.hud-cell.h-best .hud-val{color:var(--pink)}

/* GAME BOARD */
.board-wrap{background:var(--card);border:2px solid rgba(0,229,255,0.15);
  border-radius:20px;padding:1rem;
  perspective:1000px;
  box-shadow:0 0 50px rgba(0,229,255,0.06),0 0 100px rgba(156,33,176,0.05)}
.board{display:grid;gap:0.5rem;margin:0 auto;justify-content:center}

/* CARDS */
.mc{border-radius:12px;cursor:pointer;aspect-ratio:1;
  position:relative;perspective:800px;
  user-select:none;-webkit-tap-highlight-color:transparent}
.mc:hover:not(.flipped):not(.matched){filter:brightness(1.15)}
.mc.matched{cursor:default}

.mc-front,.mc-back{position:absolute;inset:0;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  transition:transform 0.5s ease;border:2px solid rgba(255,255,255,0.07)}

.mc-front{background:linear-gradient(145deg,#3d0080,#1a0040);
  transform:rotateY(0deg);font-size:1.4rem;color:rgba(255,255,255,0.2)}

.mc-back{background:linear-gradient(145deg,#1b0030,#120020);
  transform:rotateY(180deg)}

.mc.flipped .mc-front{transform:rotateY(-180deg)}
.mc.flipped .mc-back{transform:rotateY(0deg)}
.mc.matched .mc-front{transform:rotateY(-180deg)}
.mc.matched .mc-back{transform:rotateY(0deg);
  background:rgba(0,230,118,0.1);border-color:rgba(0,230,118,0.3)}

.card-emoji{line-height:1;pointer-events:none}
.mc.matched .card-emoji{animation:matchPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards}
@keyframes matchPop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

/* PATTERN ON CARD FRONT */
.mc-front::before{content:'🧁';font-size:0.85em;opacity:0.12;position:absolute}

/* WIN BANNER */
.win-banner{display:none;text-align:center;
  background:linear-gradient(135deg,rgba(0,230,118,0.1),rgba(0,229,255,0.07));
  border:1.5px solid rgba(0,230,118,0.25);border-radius:16px;
  padding:1.5rem 1rem;margin-top:1rem;animation:fadeUp 0.4s ease}
.win-emoji{font-size:3rem;margin-bottom:0.5rem}
.win-title{font-family:var(--display);font-size:1.8rem;color:var(--green);margin-bottom:0.4rem}
.win-stats{font-size:0.82rem;color:var(--muted);margin-bottom:1rem;line-height:1.8}
.win-stat-val{color:var(--yellow);font-weight:800}
.win-new-best{display:inline-block;background:rgba(255,214,0,0.1);
  border:1px solid rgba(255,214,0,0.3);border-radius:8px;
  padding:0.3rem 0.8rem;font-size:0.7rem;font-weight:800;color:var(--yellow);
  margin-bottom:0.8rem}

/* BTN */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:0.4rem;
  padding:0.7rem 1.5rem;border:none;border-radius:12px;cursor:pointer;
  font-family:var(--font);font-size:0.82rem;font-weight:800;
  transition:all 0.15s;white-space:nowrap;text-decoration:none}
.btn:active{transform:scale(0.95)}
.btn-cyan{background:var(--cyan);color:#000;box-shadow:0 6px 20px rgba(0,229,255,0.25)}
.btn-cyan:hover{box-shadow:0 8px 28px rgba(0,229,255,0.35);transform:translateY(-2px)}
.btn-ghost{background:rgba(255,255,255,0.05);color:var(--text);border:1.5px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,0.09)}
.btn-row{display:flex;gap:0.6rem;justify-content:center;flex-wrap:wrap;margin-top:0.8rem}

/* BEST TIMES TABLE */
.records{margin-top:1.5rem;background:var(--card);border:1px solid var(--border);
  border-radius:16px;overflow:hidden}
.records-head{padding:0.7rem 1rem;border-bottom:1px solid var(--border);
  font-size:0.6rem;font-weight:800;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--muted)}
.rec-row{display:flex;align-items:center;justify-content:space-between;
  padding:0.65rem 1rem;border-bottom:1px solid rgba(255,255,255,0.04)}
.rec-row:last-child{border-bottom:none}
.rec-diff{display:flex;align-items:center;gap:0.5rem;font-size:0.8rem;font-weight:800}
.rec-badge{font-size:0.58rem;font-weight:800;letter-spacing:0.1em;
  text-transform:uppercase;padding:0.18rem 0.5rem;border-radius:6px}
.rec-time{font-family:var(--display);font-size:1rem;color:var(--yellow)}
.rec-time.empty{color:var(--muted);font-size:0.75rem;font-family:var(--font)}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;
  transform:translateX(-50%) translateY(30px);opacity:0;
  background:rgba(22,0,42,0.96);border:1px solid var(--cyan);border-radius:10px;
  padding:0.6rem 1.2rem;font-size:0.78rem;font-weight:800;color:var(--cyan);
  z-index:9999;transition:all 0.35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* CONFETTI */
.cf{position:fixed;top:-8px;border-radius:2px;pointer-events:none;z-index:9998;
  animation:cffall linear forwards}
@keyframes cffall{0%{opacity:1;transform:translateY(0) rotate(0)}
  100%{opacity:0;transform:translateY(105vh) rotate(600deg) translateX(var(--dx))}}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- NAV -->
<nav class="nav">
  <a class="nav-logo" href="index.html">🎮 Anne Arcade</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Home</a>
    <a class="nav-link" href="cakerun.html">🦕 Run</a>
    <a class="nav-link active" href="faithfun.html">🧁 Memory</a>
    <a class="nav-link" href="faithfit.html">💪 Fit</a>
    <a class="nav-link" href="jokes.html">🌸 Vibes</a>
  </div>
</nav>

<div class="page">

  <!-- HEADER -->
  <div class="page-header">
    <div class="page-eyebrow">🧠 Memory Game</div>
    <div class="page-title">🧁 Faith Fun</div>
    <div class="page-sub">Flip cards to find matching cake pairs. The faster, the better!</div>
  </div>

  <!-- DIFFICULTY -->
  <div class="diff-wrap">
    <div class="diff-label">— choose difficulty —</div>
    <div class="diff-row">
      <button class="diff-btn active" id="db-easy" onclick="setDiff('easy',this)">
        <span class="diff-icon">🍭</span>
        <span class="diff-name">Easy</span>
        <span class="diff-info">6 pairs · 3×4</span>
      </button>
      <button class="diff-btn" id="db-med" onclick="setDiff('med',this)">
        <span class="diff-icon">🎂</span>
        <span class="diff-name">Medium</span>
        <span class="diff-info">8 pairs · 4×4</span>
      </button>
      <button class="diff-btn" id="db-hard" onclick="setDiff('hard',this)">
        <span class="diff-icon">🔥</span>
        <span class="diff-name">Hard</span>
        <span class="diff-info">10 pairs · 4×5</span>
      </button>
    </div>
  </div>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-cell">
      <div class="hud-label">Moves</div>
      <div class="hud-val" id="hudMoves">0</div>
    </div>
    <div class="hud-cell">
      <div class="hud-label">Pairs</div>
      <div class="hud-val" id="hudPairs">0</div>
    </div>
    <div class="hud-cell h-time">
      <div class="hud-label">Time ⏱</div>
      <div class="hud-val" id="hudTime">0s</div>
    </div>
    <div class="hud-cell h-best">
      <div class="hud-label">Best 🏆</div>
      <div class="hud-val" id="hudBest">--</div>
    </div>
  </div>

  <!-- BOARD -->
  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="win-banner" id="winBanner">
      <div class="win-emoji">🎉🧁🎉</div>
      <div class="win-title">You Win!</div>
      <div class="win-stats" id="winStats"></div>
      <button class="btn btn-cyan" onclick="newGame()">Play Again 🔀</button>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-ghost" onclick="newGame()">🔀 New Game</button>
  </div>

  <!-- RECORDS -->
  <div class="records">
    <div class="records-head">🏆 Best Times</div>
    <div class="rec-row">
      <div class="rec-diff">
        <span style="font-size:1.2rem">🍭</span>
        <span>Easy</span>
        <span class="rec-badge" style="background:rgba(0,230,118,0.1);color:#00e676">6 pairs</span>
      </div>
      <div class="rec-time" id="rec-easy">--</div>
    </div>
    <div class="rec-row">
      <div class="rec-diff">
        <span style="font-size:1.2rem">🎂</span>
        <span>Medium</span>
        <span class="rec-badge" style="background:rgba(255,214,0,0.1);color:#ffd600">8 pairs</span>
      </div>
      <div class="rec-time" id="rec-med">--</div>
    </div>
    <div class="rec-row">
      <div class="rec-diff">
        <span style="font-size:1.2rem">🔥</span>
        <span>Hard</span>
        <span class="rec-badge" style="background:rgba(255,61,138,0.1);color:#ff3d8a">10 pairs</span>
      </div>
      <div class="rec-time" id="rec-hard">--</div>
    </div>
  </div>

</div>

<script>
// ── UTILS ──────────────────────────────────
let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2500);
}
function confetti(n=50){
  const cols=['#ffd600','#ff3d8a','#00e5ff','#ff6d00','#00e676','#c026d3','#fff'];
  for(let i=0;i<n;i++){
    const d=document.createElement('div');d.className='cf';
    const dx=(Math.random()-.5)*280+'px';
    d.style.cssText=`left:${Math.random()*100}vw;background:${cols[i%cols.length]};
      width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;
      border-radius:${Math.random()>.5?'50%':'2px'};--dx:${dx};
      animation-duration:${1.5+Math.random()*2.5}s;
      animation-delay:${Math.random()*.4}s`;
    document.body.appendChild(d);setTimeout(()=>d.remove(),4000);
  }
}
function shuffle(arr){return arr.sort(()=>Math.random()-.5)}
function fmtTime(s){return s<60?s+'s':Math.floor(s/60)+'m '+s%60+'s'}

// ── CAKE EMOJIS ────────────────────────────
const EMOJIS=['🎂','🍰','🧁','🍮','🍩','🍪','🍫','🍬','🍭','🥧'];

// ── DIFFICULTY CONFIG ──────────────────────
const DIFFS={
  easy: {pairs:6,  cols:3, label:'Easy',   emoji:'🍭'},
  med:  {pairs:8,  cols:4, label:'Medium',  emoji:'🎂'},
  hard: {pairs:10, cols:4, label:'Hard',    emoji:'🔥'},
};

// ── BEST TIMES ─────────────────────────────
let bests = JSON.parse(localStorage.getItem('aa_ff_bests')||'{}');

function loadBests(){
  ['easy','med','hard'].forEach(d=>{
    const el=document.getElementById('rec-'+d);
    const hEl=document.getElementById('hudBest');
    el.textContent = bests[d] ? fmtTime(bests[d]) : '--';
    el.className   = bests[d] ? 'rec-time' : 'rec-time empty';
    if(d===curDiff) hEl.textContent = bests[d] ? fmtTime(bests[d]) : '--';
  });
}

// ── GAME STATE ─────────────────────────────
let curDiff   = 'easy';
let cards     = [];
let flipped   = [];
let matched   = 0;
let moves     = 0;
let seconds   = 0;
let timerID   = null;
let canFlip   = true;
let gameActive= false;

// ── SET DIFFICULTY ─────────────────────────
function setDiff(d, btn){
  curDiff = d;
  document.querySelectorAll('.diff-btn').forEach(b=>{
    b.classList.remove('active');
  });
  btn.classList.add('active');
  newGame();
}

// ── NEW GAME ───────────────────────────────
function newGame(){
  clearInterval(timerID);
  seconds=0; moves=0; matched=0; flipped=[]; canFlip=true; gameActive=false;
  document.getElementById('hudMoves').textContent = '0';
  document.getElementById('hudPairs').textContent = '0';
  document.getElementById('hudTime').textContent  = '0s';
  document.getElementById('winBanner').style.display = 'none';
  loadBests();
  buildBoard();
}

// ── BUILD BOARD ────────────────────────────
function buildBoard(){
  const {pairs, cols} = DIFFS[curDiff];
  const emojis  = EMOJIS.slice(0,pairs);
  const deck    = shuffle([...emojis,...emojis]);
  const board   = document.getElementById('board');

  // Card size responsive
  const boardW  = board.parentElement.clientWidth || 320;
  const maxW    = Math.min(520, boardW - 32);
  const cardSz  = Math.min(76, Math.floor((maxW - (cols-1)*8) / cols));
  const rows    = Math.ceil(deck.length / cols);

  board.style.gridTemplateColumns = `repeat(${cols},${cardSz}px)`;
  board.style.width = (cardSz*cols + (cols-1)*8)+'px';
  board.innerHTML   = '';
  cards = [];

  deck.forEach((emoji, i)=>{
    const card = document.createElement('div');
    card.className = 'mc';
    card.style.width  = cardSz+'px';
    card.style.height = cardSz+'px';
    card.style.fontSize = Math.floor(cardSz*.44)+'px';
    card.style.animationDelay = (i*0.03)+'s';
    card.style.animation = 'fadeIn 0.4s ease both';
    card.innerHTML = `<div class="mc-front">🧁</div><div class="mc-back"><span class="card-emoji" style="font-size:${Math.floor(cardSz*.46)}px">${emoji}</span></div>`;
    card.dataset.emoji = emoji;
    card.dataset.idx   = i;
    card.addEventListener('click', ()=>flipCard(card, emoji, i));
    board.appendChild(card);
    cards.push(card);
  });
}

// ── FLIP CARD ──────────────────────────────
function flipCard(card, emoji, idx){
  if(!canFlip) return;
  if(card.classList.contains('flipped')) return;
  if(card.classList.contains('matched')) return;

  // Start timer on first flip
  if(!gameActive){
    gameActive=true;
    timerID=setInterval(()=>{
      seconds++;
      document.getElementById('hudTime').textContent=fmtTime(seconds);
    },1000);
  }

  card.classList.add('flipped');
  flipped.push({card, emoji, idx});

  if(flipped.length===2){
    canFlip=false;
    moves++;
    document.getElementById('hudMoves').textContent=moves;

    if(flipped[0].emoji===flipped[1].emoji){
      // MATCH
      setTimeout(()=>{
        flipped.forEach(f=>{
          f.card.classList.add('matched');
          f.card.classList.remove('flipped');
        });
        matched++;
        document.getElementById('hudPairs').textContent=matched;
        flipped=[];
        canFlip=true;
        if(matched===DIFFS[curDiff].pairs) gameWin();
      },400);
    } else {
      // NO MATCH — flip back
      setTimeout(()=>{
        flipped.forEach(f=>f.card.classList.remove('flipped'));
        flipped=[];
        canFlip=true;
      },750);
    }
  }
}

// ── WIN ────────────────────────────────────
function gameWin(){
  clearInterval(timerID);
  gameActive=false;

  const isNewBest = !bests[curDiff] || seconds < bests[curDiff];
  if(isNewBest){
    bests[curDiff]=seconds;
    localStorage.setItem('aa_ff_bests',JSON.stringify(bests));
  }

  confetti(65);
  loadBests();

  const {label,emoji}=DIFFS[curDiff];
  const banner=document.getElementById('winBanner');
  const rating = moves<=DIFFS[curDiff].pairs*2?'🌟 Perfect!':moves<=DIFFS[curDiff].pairs*3?'⭐ Great!':'👍 Nice!';

  document.getElementById('winStats').innerHTML=`
    <div>${rating} — ${label} mode ${emoji}</div>
    <div>⏱ Time: <span class="win-stat-val">${fmtTime(seconds)}</span></div>
    <div>🎯 Moves: <span class="win-stat-val">${moves}</span></div>
    <div>🏆 Best: <span class="win-stat-val">${fmtTime(bests[curDiff])}</span></div>
    ${isNewBest?'<div class="win-new-best">🎉 NEW BEST TIME!</div>':''}
  `;
  banner.style.display='block';

  if(isNewBest) toast('🏆 New best time: '+fmtTime(seconds)+'!');
  else toast('🧁 All pairs matched! Well done!');
}

// ── INIT ───────────────────────────────────
loadBests();
window.addEventListener('load', ()=>{ newGame(); });
</script>
</body>
</html>
